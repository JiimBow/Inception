services:
  mariadb:
    container_name: mariadb
    build:
      context: ./requirements/mariadb
    restart: always
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    expose:
      - "3306"

  wordpress:
    container_name: wordpress
    build:
      context: ./requirements/wordpress
    restart: always
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      - mariadb
    networks:
      - inception
    expose:
      - "9000"

  nginx:
    container_name: nginx
    build:
      context: ./requirements/nginx
    restart: always
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      - wordpress
    networks:
      - inception
    expose:
      - "443:443"
    
volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: 'none'
      o: bind
    device: '/Users/jodone/data/mariadb'
  wordpress_data:
    driver: local
    driver_opts:
      type: 'none'
      o: bind
    device: '/Users/jodone/data/wordpress'

networks:
  inception:
    driver: bridge